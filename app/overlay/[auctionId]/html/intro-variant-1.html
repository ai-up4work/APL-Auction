<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CrickPro - Highlights Overlay (Corner-Cut Broadcast Style)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { aplBlue: '#3B8BD4', aplGreen: '#2A9D5C', aplNavy: '#0A0E1A', aplGold: '#E8B94A' },
        fontFamily: { sans: ['Inter','sans-serif'], heading: ['Montserrat','sans-serif'] },
      }
    }
  }
</script>
<style>
  html,body{margin:0;height:100%;background:transparent;}

  /* Overlay canvas is transparent by default so it composites over live video.
     No full-screen background plate — only the individual badges/cards below
     carry their own semi-opaque backing. */
  .bg-photo-plate{background:transparent;position:relative;}

  /* Compact badge shape language: small contained boxes with just a corner notch,
     matching the reference's small chips rather than full-width angled panels */
  .cut-tl{clip-path:polygon(0 0, 100% 0, 100% 100%, 14px 100%, 0 calc(100% - 14px));border-radius:0 0 4px 0;}
  .cut-tr{clip-path:polygon(0 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%);border-radius:0 0 0 4px;}
  .cut-br{clip-path:polygon(14px 0, 100% 0, 100% 100%, 0 100%, 0 14px);border-radius:4px 0 0 0;}
  .cut-bl{clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);border-radius:0 4px 0 0;}

  .comp-badge-img{width:46px;height:46px;border-radius:9999px;object-fit:cover;border:2px solid rgba(255,255,255,.25);flex-shrink:0;background:#0A0E1A;}

  /* Restored team-card treatment: big glowing circular logos with a spinning shine ring */
  .shine-ring{position:absolute;inset:-8px;border-radius:50%;-webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));animation:spin 3.5s linear infinite;}
  .shine-ring-blue{background:conic-gradient(from 0deg, transparent 0%, transparent 78%, rgba(59, 139, 212, 0.9) 92%, #9ecbf0 98%, transparent 100%);}
  .shine-ring-green{background:conic-gradient(from 180deg, transparent 0%, transparent 78%, rgba(42, 157, 92, 0.9) 92%, #8fe0b0 98%, transparent 100%);}
  .shine-ring-vs{background:conic-gradient(from 90deg, transparent 0%, transparent 70%, rgba(255,255,255,0.85) 88%, rgba(255,255,255,0.4) 96%, transparent 100%);}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(59,139,212,.4));}50%{filter:drop-shadow(0 0 18px rgba(59,139,212,.8));}}

  .team-logo-card{width:112px;height:112px;border-radius:9999px;border:3px solid rgba(255,255,255,.1);padding:10px;background:linear-gradient(180deg,#0A0E1A,#000);box-shadow:0 10px 26px rgba(0,0,0,.5);overflow:hidden;}
  .team-logo-card img{width:100%;height:100%;object-fit:contain;}
  .team-name-label{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:.03em;color:#fff;line-height:1;white-space:nowrap;}
  .team-underline{height:3px;width:100%;margin-top:6px;}
  .team-underline-blue{background:linear-gradient(90deg,#3B8BD4,transparent);}
  .team-underline-green{background:linear-gradient(90deg,transparent,#2A9D5C);}
  .vs-glow{box-shadow:0 0 24px rgba(255,255,255,.16), inset 0 0 12px rgba(255,255,255,.1);}

  .highlights-text{
    font-family:'Montserrat',sans-serif;font-weight:900;font-style:italic;
    font-size:3.1rem;letter-spacing:.01em;color:#fff;line-height:.95;
    text-shadow:0 4px 24px rgba(0,0,0,.5);
  }
  .highlights-underline{height:5px;width:86px;background:linear-gradient(90deg,#3B8BD4,#2A9D5C);border-radius:2px;margin-top:10px;}

  .timestamp-badge{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:.02em;color:#fff;}

  @keyframes fadeUp{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:translateY(0);}}
  .anim{animation:fadeUp .6s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0;}
</style>
</head>
<body class="text-white font-sans antialiased" style="background:transparent;">
<main class="relative h-screen w-screen overflow-hidden" data-purpose="highlights-overlay">

  <!-- Top-left: competition badge, small inset chip with corner notch -->
  <div class="absolute top-4 left-4 cut-tl bg-black/70 backdrop-blur-sm pl-3 pr-4 py-2 flex items-center gap-2.5 anim" style="animation-delay:.1s" data-purpose="competition-badge">
    <img alt="Moonlight Cup Logo" class="comp-badge-img" src="https://lh3.googleusercontent.com/aida/AP1WRLuSV1r1sxil5nzb1p6N87hNpeOJ4xyWLa-2ddp9b3-lToartvOVYlHU4WAmGs6O3FEQcRNMeukyCLTSEViThFa3N80HxN_RIDFeqkBF563bZXxjrEtzpesVaLlXoBYjsFG08yhw-PGnnmIQ4woFfPFskotK5cd1H2UNIqS35FuYIrn7lfi_wDIC6wYgqTJVkmLXw-jwxKFBVMuGUltoYLotYgwurl-8vN4lMBC7jzeD8eaziL4yHxcGD8g"/>
    <div class="flex flex-col leading-tight">
      <span class="font-heading font-black text-[.8rem] tracking-wide uppercase">Moonlight Cup 2026</span>
      <span class="text-[.62rem] tracking-[.15em] uppercase text-white/50">Match Day 14 Qualifiers</span>
    </div>
  </div>

  <!-- Top-right: channel / network badge, small inset chip with corner notch -->
  <div class="absolute top-4 right-4 cut-tr bg-black/70 backdrop-blur-sm pl-4 pr-3 py-2 flex items-center gap-2 anim" style="animation-delay:.2s" data-purpose="channel-badge">
    <span class="font-heading font-black italic tracking-tighter text-sm">CRICKPRO</span>
    <div class="flex items-center gap-1.5 bg-red-600 px-2 py-1 rounded text-[9px] font-bold tracking-widest uppercase">
      <span class="w-1.5 h-1.5 rounded-full bg-white"></span>LIVE
    </div>
  </div>

  <!-- Bottom-left: restored team-card matchup with big glowing logos -->
  <div class="absolute left-9 bottom-40 flex items-center gap-5 anim" style="animation-delay:.35s" data-purpose="team-matchup">
    <div class="flex items-center gap-4">
      <div class="relative" style="animation:glowPulse 3s infinite ease-in-out;">
        <div class="shine-ring shine-ring-blue"></div>
        <div class="team-logo-card">
          <img alt="GRG XI Logo" src="https://lh3.googleusercontent.com/aida/AP1WRLuSV1r1sxil5nzb1p6N87hNpeOJ4xyWLa-2ddp9b3-lToartvOVYlHU4WAmGs6O3FEQcRNMeukyCLTSEViThFa3N80HxN_RIDFeqkBF563bZXxjrEtzpesVaLlXoBYjsFG08yhw-PGnnmIQ4woFfPFskotK5cd1H2UNIqS35FuYIrn7lfi_wDIC6wYgwurl-8vN4lMBC7jzeD8eaziL4yHxcGD8g"/>
        </div>
      </div>
      <div class="flex flex-col items-start">
        <span class="team-name-label">GRG</span>
        <div class="team-underline team-underline-blue"></div>
      </div>
    </div>

    <div class="relative flex-shrink-0">
      <div class="shine-ring shine-ring-vs" style="animation-duration:5s;"></div>
      <div class="vs-glow relative w-16 h-16 rounded-full flex items-center justify-center"
           style="background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.14), rgba(10,14,26,.9) 70%); border:1px solid rgba(255,255,255,.25);">
        <span class="font-heading text-base font-black italic tracking-tighter text-white">VS</span>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <div class="flex flex-col items-start">
        <span class="team-name-label">GG</span>
        <div class="team-underline team-underline-green"></div>
      </div>
      <div class="relative" style="animation:glowPulse 3s infinite ease-in-out;animation-delay:.3s;">
        <div class="shine-ring shine-ring-green"></div>
        <div class="team-logo-card">
          <img alt="GG Logo" src="https://lh3.googleusercontent.com/aida/AP1WRLsgD6qfNJzwXUL-IM7O6hmkyTSbcxKxUWe_j0ql7ScT4f_JJArqmIfIFb-vdtVoTZtJMPbXRPt6yTDb3DV7JCsZIzl71-szl8pvVGY3F_eZ1Iii3ubYhgXVX3zyNCIfF3dSuCh7Mwwa5OLdV-ReCO8e9t1vgp1eOB8DpmJEhBfm40tBhPRQjzxQsJKTKEPJEXEPEW-CSzcRi1rklZPAPkqjpiFDm-mi3EbO9juhSaFd8PG7ssbHdi0scw"/>
        </div>
      </div>
    </div>
  </div>

  <!-- HIGHLIGHTS title -->
  <div class="absolute left-9 bottom-9 anim" style="animation-delay:.5s" data-purpose="highlights-title">
    <div class="highlights-text">HIGHLIGHTS</div>
    <div class="highlights-underline"></div>
  </div>

  <!-- Bottom-right: timestamp badge, small inset chip with corner notch -->
  <div class="absolute right-4 bottom-6 cut-br bg-black/70 backdrop-blur-sm pl-4 pr-4 py-2 anim" style="animation-delay:.6s" data-purpose="timestamp-badge">
    <span class="timestamp-badge">19:30 <span class="text-white/40 text-sm font-semibold">IST</span></span>
  </div>

</main>
</body></html>
